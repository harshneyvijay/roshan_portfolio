<section
  data-aos="fade-up"
  id="certifications"
  class="snap-start px-6 max-w-6xl mx-auto"
>
  <div class="w-full rounded-3xl p-8">
    <h2 class="text-4xl font-black text-black mb-10">
      Licenses & Certifications
    </h2>

    <div class="flex flex-wrap gap-5 items-stretch">
      {% if certificates %} {% for cert in certificates %}
      <a
        href="{{ cert.file.url }}"
        target="_blank"
        class="group w-[320px] flex"
      >
        <div
          class="relative flex flex-col w-full overflow-hidden rounded-2xl bg-gradient-to-br from-transparent via-zinc-200 to-transparent border border-white/10 p-5 transition-all duration-500 ease-out hover:-translate-y-2 hover:scale-[1.02] hover:border-neutral-600/30 hover:shadow-[0_20px_60px_rgba(245,158,11,0.15)]"
        >
          <!-- Metallic Shine -->
          <div
            class="absolute inset-0 overflow-hidden rounded-2xl pointer-events-none z-[2]"
          >
            <div
              class="absolute left-[-150%] top-0 h-full w-1/3 rotate-12 bg-gradient-to-r from-transparent via-white/80 to-transparent opacity-70 group-hover:left-[150%] transition-all duration-1000 ease-out"
            ></div>
          </div>

          <!-- Content -->
          <div class="relative z-10 flex flex-col h-full">
            <!-- Title -->
            <h3 class="text-xl font-black text-zinc-900 line-clamp-2">
              {{ cert.title }}
            </h3>

            <!-- Description -->
            {% if cert.desc %}
            <p class="mt-3 text-sm text-zinc-600 leading-relaxed line-clamp-2">
              {{ cert.desc }}
            </p>
            {% endif %}

            <!-- Preview -->
            <div class="mt-5 overflow-hidden rounded-xl">
              {% if cert.preview %}

              <img
                src="{{ cert.preview.url }}"
                class="w-full h-60 object-cover rounded-xl transition-transform duration-500 group-hover:scale-105"
              />

              {% else %}

              <div
                class="w-full h-60 rounded-xl bg-zinc-100 flex items-center justify-center"
              >
                <span class="text-zinc-400"> No Preview Available </span>
              </div>

              {% endif %}
            </div>

            <!-- Footer -->
            <div class="mt-auto pt-6 flex justify-end">
              <span
                class="flex items-center gap-2 text-orange-500 font-semibold"
              >
                View Certificate

                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
              </span>
            </div>
          </div>
        </div>
      </a>
      {% endfor %} {% endif %}
    </div>
  </div>
</section>
