<section
  data-aos="fade-up"
  id="contact"
  class="snap-start px-6 max-w-6xl mx-auto mb-20"
>
  <div class="w-full rounded-3xl p-8">
    <div
      class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-transparent via-zinc-200 to-transparent border border-white/10 p-5 transition-all duration-500 ease-out hover:-translate-y-2 hover:scale-[1.02] hover:border-neutral-600/30 hover:shadow-[0_20px_60px_rgba(245,158,11,0.15)]"
    >
      <!-- Metallic Shine -->
      <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div
          class="absolute left-[-150%] top-0 h-full w-1/3 rotate-12 bg-gradient-to-r from-transparent via-white/80 to-transparent opacity-70 group-hover:left-[150%] transition-all duration-1000 ease-out"
        ></div>
      </div>

      <!-- Heading -->
      <div class="text-center">
        <h2 class="text-4xl font-black text-black">Let's Connect</h2>

        <p class="mt-4 text-neutral-800 max-w-2xl mx-auto">
          Feel free to reach out for internships, collaborations, open-source
          projects, or just to connect.
        </p>
      </div>

      <!-- Contact Icons -->
      <div class="mt-12 flex flex-wrap justify-center gap-8">
        <!-- Email -->
        <div class="flex flex-col items-center gap-2">
          <a
            href="mailto:{{ contact.email }}"
            title="{{ contact.email }}"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-red-500/40 hover:text-red-400"
          >
            <i class="fa-solid fa-envelope"></i>
          </a>

          <span class="text-xs text-neutral-800">Email</span>
        </div>

        <!-- Phone -->
        {% if contact.phone %}
        <div class="flex flex-col items-center gap-2">
          <a
            href="tel:{{ contact.phone }}"
            title="{{ contact.phone }}"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-green-700/40 hover:text-green-500"
          >
            <i class="fa-solid fa-phone"></i>
          </a>

          <span class="text-xs text-neutral-800">Phone</span>
        </div>
        {% endif %}

        <!-- GitHub -->
        <div class="flex flex-col items-center gap-2">
          <a
            href="{{ contact.github }}"
            target="_blank"
            title="GitHub"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-black/30 hover:text-black"
          >
            <i class="fa-brands fa-github"></i>
          </a>

          <span class="text-xs text-neutral-800">GitHub</span>
        </div>

        <!-- LinkedIn -->
        <div class="flex flex-col items-center gap-2">
          <a
            href="{{ contact.linkedin }}"
            target="_blank"
            title="LinkedIn"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-sky-900/40 hover:text-sky-800"
          >
            <i class="fa-brands fa-linkedin"></i>
          </a>

          <span class="text-xs text-neutral-800">LinkedIn</span>
        </div>

        <!-- X -->
        {% if contact.twitter %}
        <div class="flex flex-col items-center gap-2">
          <a
            href="{{ contact.twitter }}"
            target="_blank"
            title="X"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-black/30 hover:text-black"
          >
            <i class="fa-brands fa-x-twitter"></i>
          </a>

          <span class="text-xs text-neutral-800">X</span>
        </div>
        {% endif %}

        <!-- Resume -->
        {% if resumes %} {% with resume=resumes.0 %}
        <div class="flex flex-col items-center gap-2">
          <a
            href="{{ resume.file.url }}"
            target="_blank"
            title="Resume"
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-zinc-50 via-zinc-400 to-black flex items-center justify-center text-2xl text-neutral-300 transition-all duration-300 hover:-translate-y-1 hover:scale-110 hover:border-orange-500/40 hover:text-orange-400"
          >
            <i class="fa-solid fa-file-lines"></i>
          </a>

          <span class="text-xs text-neutral-800">Resume</span>
        </div>
        {% endwith %} {% endif %}
      </div>
    </div>
  </div>
</section>
