<section
  data-aos="fade-up"
  id="skills"
  class="snap-start px-6 max-w-6xl mx-auto"
>
  <div class="w-full rounded-3xl p-8">
    <h2 class="text-4xl font-black text-black mb-12">Skills</h2>

    <div class="space-y-12">
      {% for category in skill_categories %}

      <!-- Category -->
      <div>
        <h3 class="text-2xl font-black text-orange-500 mb-6">
          {{ category.name }}
        </h3>

        <div class="flex flex-wrap gap-5 items-stretch">
          {% for skill in category.skills.all %}

          <div
            class="group relative w-[280px] overflow-hidden rounded-2xl bg-gradient-to-br from-transparent via-zinc-200 to-transparent border border-white/10 p-5 transition-all duration-500 ease-out hover:-translate-y-2 hover:scale-[1.02] hover:border-neutral-600/30 hover:shadow-[0_20px_60px_rgba(245,158,11,0.15)]"
          >
            <!-- Metallic Shine -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
              <div
                class="absolute left-[-150%] top-0 h-full w-1/2 rotate-12 bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:left-[150%] transition-all duration-1000"
              ></div>
            </div>

            <div class="relative">
              <!-- Skill Name -->
              <h4 class="text-lg font-black text-black leading-snug">
                {{ skill.name }}
              </h4>

              <!-- Skill Level -->
              <p
                class="mt-3 text-sm font-semibold text-orange-500 transition-colors duration-300 group-hover:text-orange-600"
              >
                {{ skill.level }}
              </p>

              <!-- Subtext -->
              <p class="mt-2 text-xs text-neutral-800">Proficiency Level</p>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>

      {% empty %}

      <p class="text-neutral-800">No skills added yet.</p>

      {% endfor %}
    </div>
  </div>
</section>
